name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 'Install Firebase CLI'
        run: npm install -g firebase-tools

      - name: 'Deploy and Export Telemetry'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        continue-on-error: true
        run: |
          echo $GOOGLE_APPLICATION_CREDENTIALS > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          
          echo "Starting Firebase Deploy with Debug..." > deploy_debug.log
          firebase deploy --only hosting --project lock-recon --debug >> deploy_debug.log 2>&1
          
          echo "Committing telemetry back to repository..."
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add deploy_debug.log
          git commit -m "ci(telemetry): action reverse-commit of deploy_debug.log [skip ci]"
          git push
